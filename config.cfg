# config.cfg
forwarding = true
memory_size = 8192
latency_add = 1
latency_sub = 1
latency_addi = 1
latency_slt = 1
latency_lw = 2
latency_sw = 1
max_cycles = 1000000
data_base = 256

# ── Cache Configuration (Phase 2) ──
# L1 Instruction Cache
l1i_size = 1024
l1i_block_size = 64
l1i_assoc = 2
l1i_latency = 1

# L1 Data Cache
l1d_size = 1024
l1d_block_size = 64
l1d_assoc = 2
l1d_latency = 1

# Unified L2 Cache
l2_size = 4096
l2_block_size = 64
l2_assoc = 4
l2_latency = 4

# Main Memory Access Latency (cycles)
mem_latency = 100

# Replacement Policy: lru or fifo
replacement_policy = fifo